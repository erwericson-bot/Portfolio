<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator App</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
body {
  background: #080808; color: #fff; min-height: 100vh;
  display: flex; align-items: center; justify-content: center; padding: 20px;
}
.calculator {
  background: #212020; border-radius: 16px; padding: 20px; width: 100%; max-width: 340px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.5);
}
.display {
  background: #080808; border-radius: 10px; padding: 20px 16px; margin-bottom: 16px;
  text-align: right; overflow: hidden;
}
.display .prev { font-size: 14px; color: #ababab; min-height: 18px; word-break: break-all; }
.display .current { font-size: 34px; font-weight: 500; word-break: break-all; }
.buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
button {
  border: none; border-radius: 8px; padding: 18px 0; font-size: 18px; cursor: pointer;
  background: #333; color: #fff; transition: 0.2s; font-family: 'Poppins', sans-serif;
}
button:hover { filter: brightness(1.2); }
button:active { transform: scale(0.95); }
.btn-op { background: #ff004f; }
.btn-equal { background: #ff004f; grid-column: span 2; }
.btn-clear, .btn-del { background: #4a4a4a; }
.btn-zero { grid-column: span 2; }
</style>
</head>
<body>
<div class="calculator">
  <div class="display">
    <div class="prev" id="prevDisplay">&nbsp;</div>
    <div class="current" id="currentDisplay">0</div>
  </div>
  <div class="buttons">
    <button class="btn-clear" onclick="clearAll()">AC</button>
    <button class="btn-del" onclick="deleteLast()">DEL</button>
    <button class="btn-op" onclick="chooseOperator('%')">%</button>
    <button class="btn-op" onclick="chooseOperator('÷')">÷</button>

    <button onclick="appendNumber('7')">7</button>
    <button onclick="appendNumber('8')">8</button>
    <button onclick="appendNumber('9')">9</button>
    <button class="btn-op" onclick="chooseOperator('×')">×</button>

    <button onclick="appendNumber('4')">4</button>
    <button onclick="appendNumber('5')">5</button>
    <button onclick="appendNumber('6')">6</button>
    <button class="btn-op" onclick="chooseOperator('-')">−</button>

    <button onclick="appendNumber('1')">1</button>
    <button onclick="appendNumber('2')">2</button>
    <button onclick="appendNumber('3')">3</button>
    <button class="btn-op" onclick="chooseOperator('+')">+</button>

    <button class="btn-zero" onclick="appendNumber('0')">0</button>
    <button onclick="appendNumber('.')">.</button>
    <button class="btn-equal" onclick="calculate()">=</button>
  </div>
</div>

<script>
let current = '0';
let previous = '';
let operator = null;
let resetNext = false;

const currentDisplay = document.getElementById('currentDisplay');
const prevDisplay = document.getElementById('prevDisplay');

function updateDisplay() {
  currentDisplay.textContent = current;
  prevDisplay.textContent = previous && operator ? `${previous} ${operator}` : '\u00A0';
}

function appendNumber(num) {
  if (resetNext) {
    current = '0';
    resetNext = false;
  }
  if (num === '.' && current.includes('.')) return;
  if (current === '0' && num !== '.') {
    current = num;
  } else {
    current += num;
  }
  updateDisplay();
}

function chooseOperator(op) {
  if (operator && !resetNext) {
    calculate();
  }
  previous = current;
  operator = op;
  resetNext = true;
  updateDisplay();
}

function calculate() {
  if (!operator || previous === '') return;
  const a = parseFloat(previous);
  const b = parseFloat(current);
  let result;
  switch (operator) {
    case '+': result = a + b; break;
    case '-': result = a - b; break;
    case '×': result = a * b; break;
    case '÷': result = b === 0 ? 'Error' : a / b; break;
    case '%': result = a % b; break;
    default: return;
  }
  current = result === 'Error' ? 'Error' : String(Math.round(result * 100000000) / 100000000);
  operator = null;
  previous = '';
  resetNext = true;
  updateDisplay();
}

function clearAll() {
  current = '0';
  previous = '';
  operator = null;
  resetNext = false;
  updateDisplay();
}

function deleteLast() {
  current = current.length > 1 ? current.slice(0, -1) : '0';
  updateDisplay();
}

window.addEventListener('keydown', e => {
  if (e.key >= '0' && e.key <= '9') appendNumber(e.key);
  if (e.key === '.') appendNumber('.');
  if (e.key === '+') chooseOperator('+');
  if (e.key === '-') chooseOperator('-');
  if (e.key === '*') chooseOperator('×');
  if (e.key === '/') { e.preventDefault(); chooseOperator('÷'); }
  if (e.key === 'Enter' || e.key === '=') calculate();
  if (e.key === 'Backspace') deleteLast();
  if (e.key === 'Escape') clearAll();
});

updateDisplay();
</script>
</body>
</html>
