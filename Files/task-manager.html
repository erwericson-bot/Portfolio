<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Task Manager App</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://kit.fontawesome.com/5db04bc99e.js" crossorigin="anonymous"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
body { background: #080808; color: #fff; min-height: 100vh; padding: 40px 20px; }
.container { max-width: 700px; margin: 0 auto; }
h1 { font-size: 36px; margin-bottom: 25px; text-align: center; }
h1 span { color: #ff004f; }
.add-task { display: flex; flex-wrap: wrap; gap: 10px; background: #212020; padding: 20px; border-radius: 10px; margin-bottom: 25px; }
.add-task input[type="text"] { flex: 2; min-width: 150px; }
.add-task input[type="date"] { flex: 1; min-width: 130px; }
.add-task select { flex: 1; min-width: 110px; }
.add-task input, .add-task select {
  padding: 12px; background: #262626; border: 0; border-radius: 6px; color: #fff; font-size: 14px;
}
.add-task input:focus, .add-task select:focus { outline: 1px solid #ff004f; }
.add-task button {
  padding: 12px 24px; background: #ff004f; color: #fff; border: none; border-radius: 6px;
  cursor: pointer; font-size: 14px; font-weight: 500; transition: 0.3s;
}
.add-task button:hover { background: #d10040; }
.filters { display: flex; gap: 10px; margin-bottom: 20px; justify-content: center; }
.filters button {
  padding: 8px 18px; background: #212020; color: #ababab; border: 1px solid #333;
  border-radius: 20px; cursor: pointer; font-size: 13px; transition: 0.3s;
}
.filters button.active, .filters button:hover { background: #ff004f; color: #fff; border-color: #ff004f; }
.task-list { list-style: none; display: flex; flex-direction: column; gap: 12px; }
.task {
  background: #212020; padding: 16px 20px; border-radius: 8px; display: flex;
  align-items: center; gap: 15px; border-left: 4px solid #ababab;
}
.task.priority-high { border-left-color: #ff004f; }
.task.priority-medium { border-left-color: #f5a623; }
.task.priority-low { border-left-color: #4caf50; }
.task.done { opacity: 0.5; }
.task.done .task-title { text-decoration: line-through; }
.task-check { width: 20px; height: 20px; cursor: pointer; accent-color: #ff004f; }
.task-info { flex: 1; }
.task-title { font-size: 15px; font-weight: 500; }
.task-meta { font-size: 12px; color: #ababab; margin-top: 4px; }
.task-delete { background: none; border: none; color: #ababab; font-size: 16px; cursor: pointer; }
.task-delete:hover { color: #ff004f; }
.empty { text-align: center; color: #ababab; padding: 40px 0; }
</style>
</head>
<body>
<div class="container">
  <h1>Task <span>Manager</span></h1>

  <div class="add-task">
    <input type="text" id="taskInput" placeholder="Add a new task...">
    <input type="date" id="dateInput">
    <select id="priorityInput">
      <option value="low">Low</option>
      <option value="medium" selected>Medium</option>
      <option value="high">High</option>
    </select>
    <button onclick="addTask()">Add Task</button>
  </div>

  <div class="filters">
    <button class="active" data-filter="all" onclick="setFilter('all')">All</button>
    <button data-filter="active" onclick="setFilter('active')">Active</button>
    <button data-filter="done" onclick="setFilter('done')">Completed</button>
  </div>

  <ul class="task-list" id="taskList"></ul>
</div>

<script>
let tasks = JSON.parse(localStorage.getItem('tasks') || '[]');
let currentFilter = 'all';

function save() {
  localStorage.setItem('tasks', JSON.stringify(tasks));
}

function addTask() {
  const input = document.getElementById('taskInput');
  const date = document.getElementById('dateInput').value;
  const priority = document.getElementById('priorityInput').value;
  const title = input.value.trim();
  if (!title) return;

  tasks.push({
    id: Date.now(),
    title,
    date,
    priority,
    done: false
  });
  input.value = '';
  document.getElementById('dateInput').value = '';
  save();
  render();
}

function toggleTask(id) {
  const t = tasks.find(t => t.id === id);
  if (t) t.done = !t.done;
  save();
  render();
}

function deleteTask(id) {
  tasks = tasks.filter(t => t.id !== id);
  save();
  render();
}

function setFilter(filter) {
  currentFilter = filter;
  document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
  document.querySelector(`[data-filter="${filter}"]`).classList.add('active');
  render();
}

function render() {
  const list = document.getElementById('taskList');
  let filtered = tasks;
  if (currentFilter === 'active') filtered = tasks.filter(t => !t.done);
  if (currentFilter === 'done') filtered = tasks.filter(t => t.done);

  if (filtered.length === 0) {
    list.innerHTML = '<li class="empty">No tasks here yet.</li>';
    return;
  }

  list.innerHTML = filtered.map(t => `
    <li class="task priority-${t.priority} ${t.done ? 'done' : ''}">
      <input type="checkbox" class="task-check" ${t.done ? 'checked' : ''} onchange="toggleTask(${t.id})">
      <div class="task-info">
        <div class="task-title">${escapeHtml(t.title)}</div>
        <div class="task-meta">${t.priority.toUpperCase()} priority${t.date ? ' · Due ' + t.date : ''}</div>
      </div>
      <button class="task-delete" onclick="deleteTask(${t.id})"><i class="fa-solid fa-trash"></i></button>
    </li>
  `).join('');
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

document.getElementById('taskInput').addEventListener('keypress', e => {
  if (e.key === 'Enter') addTask();
});

render();
</script>
</body>
</html>
